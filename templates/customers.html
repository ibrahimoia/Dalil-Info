<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #2c3e50; color: white; }
        /* Smooth scrolling for responsive tables */
        .table-responsive { max-height: 70vh; overflow-y: auto; }
    </style>
</head>
<body class="p-2 p-md-4">

    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent mb-4">
        <div class="container-fluid px-0">
            <h2 class="mb-0 h4 h2-md text-uppercase fw-bold">CUSTOMER REGISTRATION</h2>
            <button class="navbar-toggler border-secondary mt-2 mt-lg-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end mt-3 mt-lg-0" id="navbarNav">
                <div class="d-flex flex-column flex-lg-row gap-2 w-100 justify-content-end">
                    <a href="/" class="btn btn-light">Transactions</a>
                    <a href="/customers" class="btn btn-primary active">Customers</a>
                    <a href="/documents" class="btn btn-light">Documents</a>
                    <a href="/qr" class="btn btn-light">QR Generator</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="row g-4">
        <div class="col-12 col-lg-4">
            <div class="bg-dark p-3 rounded">
                <h5 class="text-warning mb-3">Add Customer</h5>
                <div class="mb-2"><label class="form-label mb-1">Name</label><input type="text" id="c_name" class="form-control"></div>
                <div class="mb-2"><label class="form-label mb-1">Mobile</label><input type="text" id="c_mobile" class="form-control"></div>
                <div class="mb-2"><label class="form-label mb-1">Email</label><input type="email" id="c_email" class="form-control"></div>
                <div class="mb-3"><label class="form-label mb-1">Address</label><textarea id="c_address" class="form-control" rows="2"></textarea></div>
                <button class="btn btn-success w-100" onclick="saveCustomer()">Save Customer Info</button>
            </div>
        </div>
        
        <div class="col-12 col-lg-8">
            <div class="mb-3">
                <input type="text" id="search_customer" class="form-control form-control-lg" placeholder="🔍 Search customers by name, mobile, or email..." oninput="loadCustomers()">
            </div>
            
            <div class="bg-white text-dark p-3 rounded">
                <div class="table-responsive w-100">
                    <table class="table table-bordered align-middle mb-0">
                        <thead><tr><th>Name</th><th>Mobile</th><th>Email</th><th>Address</th><th class="text-center">Actions</th></tr></thead>
                        <tbody id="customer-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Operational Pop-up Edit Modal UI Overlay -->
    <div class="modal fade text-dark" id="editCustomerModal" tabindex="-1" aria-labelledby="editCustomerModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title text-warning" id="editCustomerModalLabel">Edit Customer Information</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Mobile (Unique ID Key)</label>
                        <input type="text" id="edit_c_mobile" class="form-control" readonly disabled>
                        <small class="text-muted d-block mt-1">Mobile indices act as structural identity mapping targets and cannot be updated.</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" id="edit_c_name" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="edit_c_email" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea id="edit_c_address" class="form-control" rows="2"></textarea>
                    </div>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-warning fw-bold text-dark" onclick="updateCustomerChanges()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Global modal helper instance variable tracking
        let editModal;

        document.addEventListener("DOMContentLoaded", () => {
            editModal = new bootstrap.Modal(document.getElementById('editCustomerModal'));
            loadCustomers();
        });

        function loadCustomers() {
            let searchQuery = document.getElementById('search_customer').value || '';
            
            fetch(`/api/customers?q=${encodeURIComponent(searchQuery)}`)
                .then(res => res.json())
                .then(data => {
                    let html = '';
                    data.forEach(c => {
                        html += `<tr>
                            <td>${c.name}</td>
                            <td>${c.mobile}</td>
                            <td>${c.email || ''}</td>
                            <td>${c.address || ''}</td>
                            <td class="text-center">
                                <div class="d-flex justify-content-center gap-1">
                                    <button class="btn btn-warning btn-sm fw-bold text-dark" onclick="openEditModal(${c.id})">Edit</button>
                                    <button class="btn btn-danger btn-sm" onclick="deleteCustomer(${c.id})">Remove</button>
                                </div>
                            </td>
                        </tr>`;
                    });
                    document.getElementById('customer-body').innerHTML = html;
                });
        }

        function saveCustomer() {
            let payload = {
                name: document.getElementById('c_name').value.trim(), 
                mobile: document.getElementById('c_mobile').value.trim(),
                email: document.getElementById('c_email').value.trim(), 
                address: document.getElementById('c_address').value.trim()
            };
            
            if(!payload.name || !payload.mobile) {
                alert("Name and Mobile field inputs are required parameter fields.");
                return;
            }

            fetch('/api/customers', {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
            }).then(() => { 
                document.getElementById('c_name').value = '';
                document.getElementById('c_mobile').value = '';
                document.getElementById('c_email').value = '';
                document.getElementById('c_address').value = '';
                loadCustomers(); 
            });
        }

        function openEditModal(customerId) {
            fetch(`/api/customers/${customerId}`)
                .then(res => res.json())
                .then(customer => {
                    // Inject database content into target interactive elements 
                    document.getElementById('edit_c_mobile').value = customer.mobile;
                    document.getElementById('edit_c_name').value = customer.name;
                    document.getElementById('edit_c_email').value = customer.email || '';
                    document.getElementById('edit_c_address').value = customer.address || '';
                    editModal.show();
                })
                .catch(err => console.error("Error retrieving individual target metadata metrics profiling rows:", err));
        }

        function updateCustomerChanges() {
            let payload = {
                name: document.getElementById('edit_c_name').value.trim(),
                mobile: document.getElementById('edit_c_mobile').value,
                email: document.getElementById('edit_c_email').value.trim(),
                address: document.getElementById('edit_c_address').value.trim()
            };

            if(!payload.name) {
                alert("Name property values cannot evaluate as an empty profile schema item.");
                return;
            }

            fetch('/api/customers', {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(() => {
                editModal.hide();
                loadCustomers();
            });
        }

        function deleteCustomer(id) {
            if(confirm("Remove this customer profile?")) {
                fetch(`/api/customers/${id}`, { method: 'DELETE' }).then(() => loadCustomers());
            }
        }
        
        window.onload = loadCustomers;

        // Intercept Enter key and turn it into a Tab focus switch
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA')) {
                if (e.target.tagName === 'TEXTAREA' && !e.shiftKey) {
                    return; 
                }
                e.preventDefault();
                const selectors = 'input:not([type="hidden"]):not([disabled]), select:not([disabled]), textarea:not([disabled]), button[onclick]';
                const focusable = Array.from(document.querySelectorAll(selectors));
                const index = focusable.indexOf(e.target);
                
                if (index > -1 && index + 1 < focusable.length) {
                    focusable[index + 1].focus();
                    if (focusable[index + 1].tagName === 'INPUT') {
                        focusable[index + 1].select();
                    }
                }
            }
        });
    </script>
</body>
</html>
