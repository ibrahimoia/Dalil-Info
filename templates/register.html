<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DALIL System - Create Account</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { 
            background-color: #2c3e50; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
        }
        /* Fluid width optimization for small device displays */
        .register-card { 
            background-color: #34495e; 
            border: 2px solid #1a252f; 
            border-radius: 10px; 
            width: 100%;
            max-width: 440px; 
            padding: 30px; 
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5); 
        }
    </style>
</head>
<body class="p-3">

    <div class="register-card">
        <h3 class="text-center text-warning mb-4 fw-bold">USER REGISTRATION</h3>
        
        {% if error %}
            <div class="alert alert-danger text-center py-2" role="alert">{{ error }}</div>
        {% endif %}

        <form action="/register" method="POST" id="registerForm">
            <div class="mb-3">
                <label class="form-label">Choose Username</label>
                <input type="text" name="username" class="form-control form-control-lg fs-6" placeholder="Minimum 3 characters" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control form-control-lg fs-6" placeholder="Enter secure password" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirm_password" class="form-control form-control-lg fs-6" placeholder="Re-type password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mb-3">Create Account</button>
            <div class="text-center">
                <a href="/login" class="text-light text-opacity-75 text-decoration-none small">← Back to Login Screen</a>
            </div>
        </form>
    </div>

    <script>
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
                e.preventDefault();
                const focusable = Array.from(document.querySelectorAll('input, button[type="submit"]'));
                const index = focusable.indexOf(e.target);
                if (index > -1 && index + 1 < focusable.length) {
                    focusable[index + 1].focus();
                }
            }
        });
    </script>
</body>
</html>
