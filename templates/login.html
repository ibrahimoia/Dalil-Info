<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DALIL System - Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #2c3e50; height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }
        .login-card { background-color: #34495e; border: 2px solid #1a252f; border-radius: 10px; width: 400px; padding: 30px; box-shadow: 0px 4px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div class="login-card">
        <h3 class="text-center text-warning mb-4">DALIL SYSTEM LOGIN</h3>
        
        {% if error %}
            <div class="alert alert-danger text-center py-2" role="alert">{{ error }}</div>
        {% endif %}
        
        {% if success %}
            <div class="alert alert-success text-center py-2" role="alert">{{ success }}</div>
        {% endif %}

        <form action="/login" method="POST" id="loginForm">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" id="username" class="form-control" placeholder="Enter Username" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="Enter Password" required>
            </div>
            <button type="submit" id="btn_submit" class="btn btn-success w-100 font-weight-bold mb-3">Access System</button>
            <div class="text-center">
                <a href="/register" class="text-info text-decoration-none small">Don't have an account? Register here</a>
            </div>
        </form>
    </div>

    <script>
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
                e.preventDefault();
                const focusable = Array.from(document.querySelectorAll('input, button[type="submit"]'));
                const index = focusable.indexOf(e.target);
                if (index > -1 && index + 1 < focusable.length) {
                    focusable[index + 1].focus();
                }
            }
        });
    </script>
</body>
</html>
