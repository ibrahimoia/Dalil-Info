<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QR Code Generator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>body { background-color: #2c3e50; color: white; }</style>
</head>
<body class="p-4">
    <div class="d-flex justify-content-between mb-4">
        <h2>QR CODE SYSTEM</h2>
        <div>
            <a href="/" class="btn btn-light">Transactions</a>
            <a href="/customers" class="btn btn-light">Customers</a>
            <a href="/documents" class="btn btn-light">Documents</a>
            <a href="/qr" class="btn btn-primary active">QR Generator</a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-5 bg-dark p-4 rounded text-center">
            <h4 class="mb-3 text-info">Generate QR Code</h4>
            <div class="mb-3 text-start"><label>Code Content</label><input type="text" id="qr_content" class="form-control"></div>
            <div class="mb-4 text-start"><label>File Name</label><input type="text" id="qr_filename" class="form-control"></div>
            <button class="btn btn-warning w-100 text-dark font-weight-bold" onclick="generateAndDownloadQR()">Generate & Download PNG</button>
        </div>
    </div>

    <script>
        function generateAndDownloadQR() {
            let content = document.getElementById('qr_content').value;
            let filename = document.getElementById('qr_filename').value;
            if(!content || !filename) { alert("Complete all data points first!"); return; }

            fetch('/api/qr/generate', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({content: content, filename: filename})
            }).then(response => response.blob())
              .then(blob => {
                  let url = window.URL.createObjectURL(blob);
                  let a = document.createElement('a');
                  a.href = url; a.download = `${filename}.png`;
                  document.body.appendChild(a); a.click(); a.remove();
              });
        }
// Intercept Enter key and turn it into a Tab focus switch
    document.addEventListener('keydown', function (e) {
        // Check if the pressed key is Enter and we are inside an input, select, or textarea
        if (e.key === 'Enter' && (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA')) {
            
            // If it's a textarea, let Enter behave normally (new line) unless you hold Shift
            if (e.target.tagName === 'TEXTAREA' && !e.shiftKey) {
                return; 
            }

            // Prevent the default form submission behavior of the Enter key
            e.preventDefault();

            // Find all visible, enabled input elements on the page
            const selectors = 'input:not([type="hidden"]):not([disabled]), select:not([disabled]), textarea:not([disabled]), button[onclick]';
            const focusable = Array.from(document.querySelectorAll(selectors));
            
            const index = focusable.indexOf(e.target);
            
            if (index > -1 && index + 1 < focusable.length) {
                // Move focus to the next element in the visual DOM tree
                focusable[index + 1].focus();
                
                // If the next element is an input, auto-select its text for quick typing
                if (focusable[index + 1].tagName === 'INPUT') {
                    focusable[index + 1].select();
                }
            }
        }
    });
    </script>
</body>
</html>
