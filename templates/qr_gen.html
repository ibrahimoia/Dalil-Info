<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { 
            background-color: #2c3e50; 
            color: white; 
            min-height: 100vh;
        }
        /* Prevents horizontal scrolling on tiny screens */
        .wrapper {
            overflow-x: hidden;
        }
    </style>
</head>
<body>
<div class="container-fluid p-3 p-md-4 wrapper">
    
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3 mb-4 border-bottom pb-3">
        <h2 class="m-0 fs-3 fs-md-2">QR CODE SYSTEM</h2>
        <div class="d-flex flex-wrap gap-2 justify-content-center">
            <a href="/" class="btn btn-sm btn-light px-3">Transactions</a>
            <a href="/customers" class="btn btn-sm btn-light px-3">Customers</a>
            <a href="/documents" class="btn btn-sm btn-light px-3">Documents</a>
            <a href="/qr" class="btn btn-sm btn-primary active px-3">QR Generator</a>
        </div>
    </div>

    <div class="row justify-content-center px-2">
        <div class="col-12 col-sm-10 col-md-6 col-lg-4 bg-dark p-4 rounded text-center shadow">
            <h4 class="mb-3 text-info">Generate QR Code</h4>
            <div class="mb-3 text-start">
                <label class="form-label">Code Content</label>
                <input type="text" id="qr_content" class="form-control" placeholder="Enter link or text">
            </div>
            <div class="mb-4 text-start">
                <label class="form-label">File Name</label>
                <input type="text" id="qr_filename" class="form-control" placeholder="e.g. my-qrcode">
            </div>
            <button class="btn btn-warning w-100 text-dark fw-bold py-2" onclick="generateAndDownloadQR()">
                Generate & Download PNG
            </button>
        </div>
    </div>

</div>

    <script>
        function generateAndDownloadQR() {
            let content = document.getElementById('qr_content').value;
            let filename = document.getElementById('qr_filename').value;
            if(!content || !filename) { alert("Complete all data points first!"); return; }

            fetch('/api/qr/generate', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({content: content, filename: filename})
            }).then(response => response.blob())
              .then(blob => {
                  let url = window.URL.createObjectURL(blob);
                  let a = document.createElement('a');
                  a.href = url; a.download = `${filename}.png`;
                  document.body.appendChild(a); a.click(); a.remove();
              });
        }

        // Intercept Enter key and turn it into a Tab focus switch
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA')) {
                if (e.target.tagName === 'TEXTAREA' && !e.shiftKey) {
                    return; 
                }
                e.preventDefault();

                const selectors = 'input:not([type="hidden"]):not([disabled]), select:not([disabled]), textarea:not([disabled]), button[onclick]';
                const focusable = Array.from(document.querySelectorAll(selectors));
                const index = focusable.indexOf(e.target);
                
                if (index > -1 && index + 1 < focusable.length) {
                    focusable[index + 1].focus();
                    if (focusable[index + 1].tagName === 'INPUT') {
                        focusable[index + 1].select();
                    }
                }
            }
        });
    </script>
</body>
</html>
