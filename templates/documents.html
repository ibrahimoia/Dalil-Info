<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Control</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #2c3e50; color: white; }
        /* Smooth scrolling for responsive tables */
        .table-responsive { max-height: 70vh; overflow-y: auto; }
    </style>
</head>
<body class="p-2 p-md-4">

    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent mb-4">
        <div class="container-fluid px-0">
            <h2 class="mb-0 h4 h2-md text-uppercase fw-bold">DOCUMENT CONTROL REGISTRY</h2>
            <button class="navbar-toggler border-secondary mt-2 mt-lg-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end mt-3 mt-lg-0" id="navbarNav">
                <div class="d-flex flex-column flex-lg-row gap-2 w-100 justify-content-end">
                    <a href="/" class="btn btn-light">Transactions</a>
                    <a href="/customers" class="btn btn-light">Customers</a>
                    <a href="/documents" class="btn btn-primary active">Documents</a>
                    <a href="/qr" class="btn btn-light">QR Generator</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="bg-dark p-4 rounded mb-4">
        <form action="/api/documents/upload" method="POST" enctype="multipart/form-data" class="row g-3">
            <div class="col-12 col-md-5">
                <label class="form-label">Select PDF Control File</label>
                <input type="file" name="file" class="form-control" accept="application/pdf" required>
            </div>
            <div class="col-12 col-md-5">
                <label class="form-label">Document Tracking Description</label>
                <input type="text" name="description" class="form-control" required>
            </div>
            <div class="col-12 col-md-2 d-grid d-md-flex align-items-end">
                <button type="submit" class="btn btn-success w-100">Upload & Catalog</button>
            </div>
        </form>
    </div>

    <div class="bg-white text-dark p-3 rounded">
        <div class="table-responsive w-100">
            <table class="table table-striped align-middle mb-0">
                <thead>
                    <tr>
                        <th>System Log ID</th>
                        <th>Filename Reference</th>
                        <th>Description Tag</th>
                        <th>Upload Timestamp</th>
                        <th style="min-width: 160px; width: 180px;">Execution</th>
                    </tr>
                </thead>
                <tbody id="doc-body"></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Fetch and display active documents from the Flask API
        function loadDocs() {
            fetch('/api/documents')
                .then(res => {
                    if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                    return res.json();
                })
                .then(data => {
                    let html = '';
                    data.forEach(d => {
                        html += `<tr>
                            <td>${d.id}</td>
                            <td>${d.filename}</td>
                            <td>${d.description}</td>
                            <td>${d.uploaded_date}</td>
                            <td>
                                <div class="d-flex gap-2">
                                    <a href="/api/documents/open/${d.filename}" target="_blank" class="btn btn-sm text-white" style="background-color: #9b59b6;">View PDF</a>
                                    <button onclick="deleteDoc(${d.id})" class="btn btn-sm btn-danger">Delete</button>
                                </div>
                            </td>
                        </tr>`;
                    });
                    document.getElementById('doc-body').innerHTML = html;
                })
                .catch(err => {
                    console.error('Error fetching registry data:', err);
                });
        }

        // Delete function targeting specific records
        function deleteDoc(docId) {
            if (confirm("Are you sure you want to delete this document from the tracking registry?")) {
                fetch(`/api/documents/${docId}`, {
                    method: 'DELETE'
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        loadDocs(); // Reload the table interface dynamically
                    } else {
                        alert("Error: " + data.message);
                    }
                })
                .catch(err => console.error('Error deleting file entry:', err));
            }
        }

        // Initialize table payload on window load
        window.onload = loadDocs;

        // Accessibility/UX: Intercept Enter key and turn it into a Tab focus switch
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA')) {
                if (e.target.tagName === 'TEXTAREA' && !e.shiftKey) return; 
                
                e.preventDefault();
                const selectors = 'input:not([type="hidden"]):not([disabled]), select:not([disabled]), textarea:not([disabled]), button[onclick]';
                const focusable = Array.from(document.querySelectorAll(selectors));
                const index = focusable.indexOf(e.target);
                
                if (index > -1 && index + 1 < focusable.length) {
                    focusable[index + 1].focus();
                    if (focusable[index + 1].tagName === 'INPUT') {
                        focusable[index + 1].select();
                    }
                }
            }
        });
    </script>
</body>
</html>
